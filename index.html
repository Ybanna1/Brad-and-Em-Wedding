<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Find Your Seat</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #f8f5f2;
    --bg-soft: #fdfaf7;
    --card: rgba(255,255,255,0.78);
    --card-strong: #ffffff;
    --text: #2f2430;
    --muted: #7d6b78;
    --border: rgba(120, 95, 115, 0.18);
    --accent: #d9b6c9;
    --accent-dark: #bf93ab;
    --accent-2: #efe3ea;
    --shadow: 0 20px 45px rgba(78, 52, 71, 0.10);
    --shadow-soft: 0 10px 25px rgba(78, 52, 71, 0.08);
    --radius: 22px;
    --radius-sm: 14px;
    --max: 760px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
  }

  body {
    min-height: 100vh;
    font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at top, rgba(217, 182, 201, 0.20), transparent 35%),
      linear-gradient(180deg, var(--bg-soft) 0%, var(--bg) 100%);
    padding: 24px 18px 60px;
  }

  .page {
    width: 100%;
    max-width: var(--max);
    margin: 0 auto;
  }

  .hero {
    background: var(--card);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.6);
    box-shadow: var(--shadow);
    border-radius: 32px;
    padding: 32px 22px 24px;
    margin-top: 18px;
  }

  .eyebrow {
    font-size: 0.78rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  h1 {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(3rem, 7vw, 4.8rem);
    line-height: 0.95;
    margin: 0 0 14px;
    font-weight: 700;
  }

  .subtitle {
    margin: 0 auto 24px;
    max-width: 28ch;
    color: var(--muted);
    font-size: 1rem;
    line-height: 1.6;
  }

  .search-wrap {
    margin-top: 22px;
  }

  input[type="text"] {
    width: 100%;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.92);
    color: var(--text);
    border-radius: 18px;
    padding: 18px 20px;
    font-size: 1.05rem;
    outline: none;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
    transition: border-color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
  }

  input[type="text"]::placeholder {
    color: #9b8d97;
  }

  input[type="text"]:focus {
    border-color: var(--accent-dark);
    box-shadow: 0 0 0 4px rgba(217, 182, 201, 0.22);
    transform: translateY(-1px);
  }

  .quick-links {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
    margin-top: 18px;
  }

  .quick-links a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 54px;
    text-decoration: none;
    color: var(--text);
    background: linear-gradient(180deg, #f6e8ef 0%, #efdbe6 100%);
    border: 1px solid rgba(191, 147, 171, 0.24);
    padding: 14px 18px;
    border-radius: 16px;
    font-weight: 600;
    font-size: 0.98rem;
    box-shadow: var(--shadow-soft);
    transition: transform 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
  }

  .quick-links a:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 28px rgba(78, 52, 71, 0.12);
    background: linear-gradient(180deg, #f8edf3 0%, #f1dfe9 100%);
  }

  .quick-links a:last-child {
    grid-column: 1 / -1;
  }

  #results {
    margin-top: 18px;
    display: grid;
    gap: 14px;
  }

  .entry {
    background: var(--card-strong);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 16px;
    box-shadow: var(--shadow-soft);
    text-align: left;
    overflow: hidden;
  }

  .entry strong {
    display: block;
    font-size: 1.05rem;
    margin-bottom: 6px;
  }

  .entry .table-label {
    color: var(--muted);
    font-size: 0.96rem;
    margin-bottom: 12px;
  }

  .entry img {
    width: 100%;
    border-radius: 14px;
    display: block;
    margin-top: 6px;
    border: 1px solid rgba(120, 95, 115, 0.12);
  }

  .empty {
    background: rgba(255,255,255,0.7);
    border: 1px dashed var(--border);
    color: var(--muted);
    border-radius: 18px;
    padding: 18px;
    text-align: center;
  }

  .popup {
    display: none;
    position: fixed;
    z-index: 1000;
    inset: 0;
    padding: 24px 16px;
    background: rgba(34, 24, 30, 0.62);
    backdrop-filter: blur(6px);
  }

  .popup-content {
    position: relative;
    width: min(920px, 100%);
    max-height: calc(100vh - 48px);
    margin: 0 auto;
    background: #fff;
    border-radius: 24px;
    overflow: auto;
    padding: 14px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.25);
  }

  .popup-content img {
    width: 100%;
    height: auto;
    border-radius: 16px;
    display: block;
  }

  .close {
    position: sticky;
    top: 0;
    margin-left: auto;
    display: grid;
    place-items: center;
    width: 42px;
    height: 42px;
    border: 0;
    border-radius: 999px;
    background: rgba(255,255,255,0.92);
    color: var(--text);
    font-size: 26px;
    line-height: 1;
    cursor: pointer;
    z-index: 2;
    box-shadow: 0 8px 18px rgba(0,0,0,0.12);
  }

  @media (max-width: 640px) {
    body {
      padding: 16px 14px 42px;
    }

    .hero {
      padding: 26px 16px 18px;
      border-radius: 24px;
    }

    h1 {
      font-size: clamp(2.6rem, 10vw, 3.6rem);
    }

    .quick-links {
      grid-template-columns: 1fr;
    }

    .quick-links a:last-child {
      grid-column: auto;
    }

    .popup {
      padding: 14px 10px;
    }

    .popup-content {
      max-height: calc(100vh - 28px);
      border-radius: 18px;
      padding: 10px;
    }
  }
</style>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2/dist/fuse.min.js"></script>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="eyebrow">Brad &amp; Em</div>
      <h1>Find Your Seat</h1>
      <p class="subtitle">Welcome to Brad and Em’s wedding. Search your name below to find your table, then view the floor plan or menu.</p>
      
      <div class="search-wrap">
        <label for="search" class="search-label">Guest name</label>
        <input type="text" id="search" placeholder="Enter your name..." aria-label="Search names" />
      </div>

      <div id="results"></div>

      <div class="quick-links">
        <a href="#" onclick="openPopup('floorplanPopup')">View Floor Plan</a>
        <a href="#" onclick="openPopup('menuPopup')">View Menu</a>
        <a id="lenseAnchor" href="#" target="_blank" rel="noopener">Open Lense</a>
      </div>
    </section>
  </div>

  <!-- Floorplan Popup -->
  <div id="floorplanPopup" class="popup" role="dialog" aria-modal="true" aria-label="Floor plan">
    <div class="popup-content">
      <span class="close" onclick="closePopup('floorplanPopup')" aria-label="Close">&times;</span>
      <img id="floorImg" src="floorplan.jpg" alt="Floor Plan" loading="lazy">
    </div>
  </div>

  <!-- Menu Popup -->
  <div id="menuPopup" class="popup" role="dialog" aria-modal="true" aria-label="Menu">
    <div class="popup-content">
      <span class="close" onclick="closePopup('menuPopup')" aria-label="Close">&times;</span>
      <img id="menuImg" src="menu.jpg" alt="Menu" loading="lazy">
    </div>
  </div>

  <script>
    // ===== Load people from CSV in your GitHub repo =====
    const CSV_URL = "https://raw.githubusercontent.com/Ybanna1/Wedding-seating-test/main/floorplan.csv";

    async function loadPeopleFromCSV() {
      const url = CSV_URL + "?cacheBust=" + Date.now();
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error("CSV fetch failed");
      const csvText = await res.text();
      const parsed = Papa.parse(csvText, { header: true, skipEmptyLines: true });

      // Accepts displayName (required), optional table/name
      return parsed.data
        .map(row => {
          // normalise headers (trim/lowercase)
          const norm = {};
          for (const [k, v] of Object.entries(row)) {
            norm[String(k).trim().toLowerCase()] = v;
          }
          const displayName = String(norm["displayname"] || "").trim();
          if (!displayName) return null;

          // accept table / table number / seat variants
          const tableAliases = ["table","table#","table number","tableno","table_no","seat"];
          let tableVal = "";
          for (const key of tableAliases) {
            if (norm[key] != null && String(norm[key]).trim() !== "") {
              tableVal = String(norm[key]).trim();
              break;
            }
          }
          const name = (norm["name"] ? String(norm["name"]) : displayName).toLowerCase().trim();
          return { displayName, name, table: tableVal };
        })
        .filter(Boolean);
    }

    (async function initSearch(){
      let people = [];
      try { people = await loadPeopleFromCSV(); } catch { people = []; }

      const fuse = new Fuse(people, { keys: ["name", "displayName"], threshold: 0.3, ignoreLocation: true });
      const searchEl = document.getElementById("search");
      const resultsDiv = document.getElementById("results");

      searchEl.addEventListener("input", function(){
        const q = this.value.trim();
        resultsDiv.innerHTML = "";
        if (!q) return;

        const out = fuse.search(q);
        if (!out.length) {
          resultsDiv.innerHTML = '<div class="empty">No match found</div>';
          return;
        }
        out.slice(0,50).forEach(({ item: p }) => {
          const div = document.createElement("div");
          div.className = "entry";

          // Build result HTML. If table exists, also show tableX.jpg (hide if missing).
          if (p.table) {
            const tableNum = p.table.replace(/[^0-9]/g,''); // keep digits if CSV has "Table 1"
            const imgName = `table${tableNum}.jpg`;
            div.innerHTML = `
  <strong>${p.displayName}</strong>
  <div class="table-label">Table ${p.table}</div>
  <img src="${imgName}" alt="Location of table ${p.table}" onerror="this.style.display='none'">
`;
          } else {
            div.textContent = p.displayName;
          }

          resultsDiv.appendChild(div);
        });
      });
    })();

    // ===== Popups: click outside to close, sticky X stays visible =====
    function openPopup(id) {
      const popup = document.getElementById(id);
      popup.style.display = 'block';

      // Close when clicking outside popup-content
      function handler(e) {
        if (e.target === popup) {
          closePopup(id);
          popup.removeEventListener('click', handler);
        }
      }
      popup.addEventListener('click', handler);
    }
    function closePopup(id) {
      document.getElementById(id).style.display = 'none';
    }
    window.openPopup = openPopup; window.closePopup = closePopup;
  </script>
</body>
</html>
